<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学基地：小伙伴分积木</title>
    <style>
        :root {
            --primary: #3498db;
            --accent: #e67e22;
            --hundreds: #27ae60;
            --tens: #f1c40f;
            --ones: #e74c3c;
            --cell-size: 50px; 
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f0f4f8;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        .container {
            width: 1150px; background: white; padding: 30px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex; gap: 15px; justify-content: center; align-items: center;
            margin-bottom: 25px; padding-bottom: 25px; border-bottom: 2px solid #eee;
        }

        input { width: 90px; padding: 10px; font-size: 22px; text-align: center; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; }
        button { padding: 10px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-next { background: var(--accent); color: white; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .display-area { display: flex; gap: 40px; height: 750px; }

        /* 左侧：竖式区 */
        .math-panel {
            flex: 0 0 450px; background: #fff; padding: 30px 20px;
            border: 2px solid #eee; border-radius: 12px;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 46px; font-weight: bold;
        }

        .grid-system {
            display: grid;
            grid-template-columns: 70px 20px var(--cell-size) var(--cell-size) var(--cell-size);
            grid-auto-rows: 50px;
            align-items: center; justify-items: center;
        }

        .grid-cell { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .divisor-area { grid-column: 1; grid-row: 2; border-right: 4px solid #333; border-bottom: 4px solid #333; border-bottom-right-radius: 20px; width: 100%; height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 15px; }
        .dividend-line { grid-column: 3 / 6; grid-row: 2; border-bottom: 4px solid #333; width: 100%; height: 100%; }
        .grid-line { border-bottom: 3px solid #333; width: 90%; height: 100%; align-self: end; justify-self: center; }
        .q-text { color: var(--primary); }

        /* 动画 */
        .falling { color: var(--accent); animation: fallDown 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes fallDown { 0% { transform: translateY(-150px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        /* 右侧：积木区 */
        .block-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .storage { border: 2px dashed #ddd; padding: 12px; border-radius: 10px; min-height: 80px; position: relative; }
        .storage::before { content: attr(data-label); position: absolute; top: -12px; left: 10px; background: white; padding: 0 5px; font-size: 14px; color: #999; }
        
        .blocks-flex { display: flex; flex-wrap: wrap; gap: 4px; }
        .b-h { width: 35px; height: 35px; background: var(--hundreds); border: 1px solid #1e8449; border-radius: 3px; }
        .b-t { width: 8px; height: 35px; background: var(--tens); border: 1px solid #d4ac0d; border-radius: 2px; }
        .b-o { width: 8px; height: 8px; background: var(--ones); border: 1px solid #c0392b; border-radius: 1px; }

        /* 小伙伴分发区 */
        .child-zones { display: flex; gap: 8px; margin-top: auto; }
        .child-box { 
            flex: 1; min-height: 180px; border: 2px solid var(--primary); 
            border-radius: 10px; background: #fff; 
            display: flex; flex-direction: column; align-items: center; padding: 8px;
            box-shadow: inset 0 0 10px rgba(52, 152, 219, 0.1);
        }
        .child-name { font-weight: bold; color: var(--primary); margin-bottom: 8px; font-size: 16px; border-bottom: 1px solid #eee; width: 100%; text-align: center; }

        .hint { position: fixed; bottom: 30px; right: 30px; background: #2c3e50; color: white; padding: 20px; border-radius: 12px; max-width: 320px; font-size: 18px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <label>被除数：</label><input type="number" id="dividend" value="432">
        <label>除数：</label><input type="number" id="divisor" value="3" min="1" max="6">
        <button class="btn-start" onclick="initDemo()">开始 / 重置</button>
        <button id="nextBtn" class="btn-next" onclick="goNext()" disabled>下一步</button>
    </div>

    <div class="display-area">
        <div class="math-panel">
            <div id="grid" class="grid-system"></div>
        </div>

        <div class="block-panel">
            <div class="storage" data-label="待分大方块"><div id="h-cont" class="blocks-flex"></div></div>
            <div class="storage" data-label="待分长条"><div id="t-cont" class="blocks-flex"></div></div>
            <div class="storage" data-label="待分小方块"><div id="o-cont" class="blocks-flex"></div></div>
            
            <div class="child-zones" id="zones"></div>
        </div>
    </div>
    <div id="hint" class="hint">输入三位数，看看小伙伴们怎么分积木吧！</div>
</div>

<script>
    const NAMES = ["仁仁", "航航", "天天", "笑笑", "乐乐", "豆豆", "果果", "皮皮", "糖糖"];
    let dVal, sVal, step = 0;
    let h, t, o;
    let origH, origT, origO;
    let hRem, tRem;
    
    const grid = document.getElementById('grid');
    window.onload = initDemo;

    function addCell(row, col, text, extraClass="") {
        if(text === "" || text === undefined || text === null) return;
        const div = document.createElement('div');
        div.className = `grid-cell ${extraClass}`;
        div.style.gridRow = row; div.style.gridColumn = col;
        div.innerText = text;
        grid.appendChild(div);
    }

    function addLine(row, startCol, endCol) {
        const div = document.createElement('div');
        div.className = "grid-line";
        div.style.gridRow = row; div.style.gridColumn = `${startCol} / ${endCol + 1}`;
        grid.appendChild(div);
    }

    function initDemo() {
        dVal = parseInt(document.getElementById('dividend').value);
        sVal = parseInt(document.getElementById('divisor').value);
        if(isNaN(dVal) || isNaN(sVal) || sVal <= 0 || sVal > 9) {
            msg("请输入1-999的被除数，和1-9的除数。"); return;
        }

        step = 0;
        origH = Math.floor(dVal / 100);
        origT = Math.floor((dVal % 100) / 10);
        origO = dVal % 10;
        h = origH; t = origT; o = origO;

        grid.innerHTML = '';
        const divBox = document.createElement('div');
        divBox.className = "divisor-area";
        divBox.style.gridRow = "2"; divBox.style.gridColumn = "1 / 3";
        divBox.innerText = sVal;
        grid.appendChild(divBox);

        const divLine = document.createElement('div');
        divLine.className = "dividend-line";
        grid.appendChild(divLine);

        addCell(2, 3, origH); addCell(2, 4, origT); addCell(2, 5, origO);

        renderBlocks();
        renderZones();
        document.getElementById('nextBtn').disabled = false;
        msg("分积木开始啦！先看百位的大方块。");
    }

    function renderBlocks() {
        document.getElementById('h-cont').innerHTML = '<div class="b-h"></div>'.repeat(h);
        document.getElementById('t-cont').innerHTML = '<div class="b-t"></div>'.repeat(t);
        document.getElementById('o-cont').innerHTML = '<div class="b-o"></div>'.repeat(o);
    }

    function renderZones() {
        const z = document.getElementById('zones');
        z.innerHTML = '';
        for(let i=0; i<sVal; i++) {
            z.innerHTML += `
                <div class="child-box" id="child-${i}">
                    <div class="child-name">${NAMES[i % NAMES.length]}</div>
                    <div class="blocks-flex" id="child-storage-${i}"></div>
                </div>`;
        }
    }

    function fillChildStorage(type, count) {
        for(let i=0; i<sVal; i++) {
            const container = document.getElementById(`child-storage-${i}`);
            for(let j=0; j<count; j++) {
                const b = document.createElement('div');
                b.className = `b-${type}`;
                container.appendChild(b);
            }
        }
    }

    function msg(txt) { document.getElementById('hint').innerText = txt; }

    function goNext() {
        step++;
        if (step === 1) { 
            let qH = Math.floor(h / sVal);
            hRem = h % sVal;
            if(origH > 0 || qH > 0) addCell(1, 3, qH, "q-text");
            addCell(3, 3, qH * sVal); addLine(4, 3, 5);
            if(hRem > 0) addCell(5, 3, hRem);
            
            fillChildStorage('h', qH); // 给小朋友发大方块
            h = hRem; renderBlocks();
            msg(`百位分完了，每个小伙伴分到 ${qH} 个大方块。还剩下 ${hRem} 个。`);

        } else if (step === 2) { 
            addCell(5, 4, origT, "falling");
            addCell(5, 5, origO, "falling");
            t += hRem * 10; h = 0; renderBlocks();
            msg("十位和个位落下来，剩下的百位拆成10个长条，现在有 " + t + " 个长条了。");

        } else if (step === 3) { 
            let qT = Math.floor(t / sVal);
            tRem = t % sVal;
            addCell(1, 4, qT, "q-text");
            let subT = qT * sVal;
            if(subT > 9) { addCell(6, 3, Math.floor(subT / 10)); addCell(6, 4, subT % 10); } 
            else { addCell(6, 4, subT); }
            addLine(7, 3, 5);
            if(tRem > 0) addCell(8, 4, tRem);
            addCell(8, 5, origO);
            
            fillChildStorage('t', qT); // 给小朋友发长条
            t = tRem; renderBlocks();
            msg(`十位分完了，每个小伙伴分到 ${qT} 个长条。`);

        } else if (step === 4) { 
            o += tRem * 10; t = 0; renderBlocks();
            msg("最后的长条也拆碎成小方块了，现在一共有 " + o + " 个小方块。");

        } else if (step === 5) { 
            let qO = Math.floor(o / sVal);
            let remFinal = o % sVal;
            addCell(1, 5, qO, "q-text");
            let subO = qO * sVal;
            if(subO > 9) { addCell(9, 4, Math.floor(subO / 10)); addCell(9, 5, subO % 10); } 
            else { addCell(9, 5, subO); }
            addLine(10, 3, 5);
            addCell(11, 5, remFinal);
            
            fillChildStorage('o', qO); // 给小朋友发小方块
            o = remFinal; renderBlocks();
            msg(remFinal === 0 ? "全部除尽啦！小伙伴们分得好开心。" : `算完啦！最后还剩下 ${remFinal} 个分不掉。`);
            document.getElementById('nextBtn').disabled = true;
        }
    }
</script>

</body>
</html>
